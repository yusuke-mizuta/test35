<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Camera App Ultimate</title>

<style>
body { margin:0; overflow:hidden; background:black; }

/* --- Video --- */
#video {
  position:fixed;
  top:0;
  width:100%;
  height:80%;
  object-fit:cover;
}

/* インカメ時だけミラー表示 */
.mirror {
  transform: scaleX(-1);
}

/* --- Overlay --- */
#overlay {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 20%;
  object-fit: cover;
  z-index: 5;
  pointer-events: none;
}

/* --- シャッター --- */
#shutter {
  position:fixed;
  bottom:22%;
  left:50%;
  transform:translateX(-50%);
  width:150px;
  height:150px;
  border:6px solid white;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
  backdrop-filter: blur(5px);
  z-index:10;
  cursor:pointer;
}
#shutter::after {
  content:"";
  position:absolute;
  top:50%;
  left:50%;
  width:110px;
  height:110px;
  background:white;
  border-radius:50%;
  transform:translate(-50%,-50%);
}
#shutter:active {
  transform:translateX(-50%) scale(0.9);
}

/* --- カメラ切替（2倍）--- */
#switchCam {
  position:fixed;
  bottom:25%;
  right:20px;
  width:120px;
  height:120px;
  border-radius:50%;
  background:rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  border:3px solid rgba(255,255,255,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10;
  cursor:pointer;
}
#switchCam svg {
  width:56px;
  height:56px;
  fill:white;
}

/* --- プレビュー --- */
#preview {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
  background:black;
  z-index:20;
}

/* --- ボタン（2倍）--- */
#close, #save {
  position:fixed;
  top:20px;
  color:white;
  font-size:48px;
  z-index:30;
  padding:16px 32px;
  border-radius:20px;
  background:rgba(0,0,0,0.5);
  backdrop-filter: blur(8px);
  cursor:pointer;
}
#close { left:20px; }
#save { right:20px; }

</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<img id="overlay" src="画像1.jpg">

<div id="shutter"></div>

<div id="switchCam">
  <svg viewBox="0 0 24 24">
    <path d="M12 5V2L8 6l4 4V7c3.31 0 6 2.69 6 6a6 6 0 01-6 6c-1.66 0-3.14-.69-4.22-1.78l-1.42 1.42A7.963 7.963 0 0012 21a8 8 0 000-16z"/>
  </svg>
</div>

<img id="preview">
<div id="close">✖</div>
<div id="save">💾</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
let lastImage = null;
let usingFront = false;
let currentStream = null;

const video = document.getElementById("video");
const overlay = document.getElementById("overlay");
const preview = document.getElementById("preview");

/* --- カメラ起動 --- */
async function startCamera() {
  if(currentStream) currentStream.getTracks().forEach(t => t.stop());
  try {
    const constraints = {
      video: { facingMode: usingFront ? "user" : "environment" }
    };
    currentStream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = currentStream;

    // ミラー切替
    if(usingFront){
      video.classList.add("mirror");
    } else {
      video.classList.remove("mirror");
    }

  } catch(e) {
    alert("カメラ起動エラー: " + e);
  }
}
startCamera();

/* --- 撮影（ここが核心）--- */
document.getElementById("shutter").onclick = () => {

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const W = window.innerWidth;
  const H = window.innerHeight;

  canvas.width = W;
  canvas.height = H;

  const vw = video.videoWidth;
  const vh = video.videoHeight;

  const screenRatio = W / (H * 0.8);
  const videoRatio = vw / vh;

  let sx, sy, sw, sh;

  // coverと同じ切り取り計算
  if(videoRatio > screenRatio){
    sh = vh;
    sw = vh * screenRatio;
    sx = (vw - sw) / 2;
    sy = 0;
  } else {
    sw = vw;
    sh = vw / screenRatio;
    sx = 0;
    sy = (vh - sh) / 2;
  }

  // インカメは保存時は反転しない
  if(usingFront){
    ctx.save();
    ctx.scale(-1, 1);
    ctx.drawImage(video, sx, sy, sw, sh, -W, 0, W, H*0.8);
    ctx.restore();
  } else {
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, W, H*0.8);
  }

  // overlay
  ctx.drawImage(
    overlay,
    0, 0, overlay.naturalWidth, overlay.naturalHeight,
    0, H * 0.8, W, H * 0.2
  );

  lastImage = canvas.toDataURL("image/png");
  preview.src = lastImage;
  preview.style.display = "block";
};

/* 閉じる */
document.getElementById("close").onclick = () => {
  preview.style.display = "none";
};

/* 保存 */
document.getElementById("save").onclick = () => {
  if(!lastImage) return alert("先に撮影してください");

  const a = document.createElement("a");
  a.href = lastImage;
  a.download = "photo.png";
  a.click();
};

/* 切替 */
document.getElementById("switchCam").onclick = () => {
  usingFront = !usingFront;
  startCamera();
};
</script>

</body>
</html>
