<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Camera App Perfect</title>

<style>
body { margin:0; overflow:hidden; background:black; }

/* Video */
#video {
  position:fixed;
  top:0;
  width:100%;
  height:100%;
  object-fit:cover;
}
.mirror { transform: scaleX(-1); }

/* Overlay */
#overlay {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 20%;
  object-fit: cover;
  z-index: 5;
  pointer-events: none;
}

/* Shutter */
#shutter {
  position:fixed;
  bottom:22%;
  left:50%;
  transform:translateX(-50%);
  width:150px;
  height:150px;
  border:6px solid white;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
}
#shutter:active {
  transform:translateX(-50%) scale(0.9);
}

/* Switch */
#switchCam {
  position:fixed;
  bottom:25%;
  right:20px;
  width:120px;
  height:120px;
  border-radius:50%;
  background:rgba(0,0,0,0.4);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
}

/* Preview */
#preview {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
  z-index:10;
}

/* Buttons */
#close,#save{
  position:fixed;
  top:20px;
  font-size:48px;
  padding:16px 32px;
  background:rgba(0,0,0,0.5);
  color:white;
  z-index:11;
}
#close{left:20px;}
#save{right:20px;}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<img id="overlay" src="画像1.jpg">

<div id="shutter"></div>
<div id="switchCam">🔄</div>

<img id="preview">
<div id="close">✖</div>
<div id="save">💾</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const video = document.getElementById("video");
const overlay = document.getElementById("overlay");
const preview = document.getElementById("preview");
const canvas = document.getElementById("canvas");

const closeBtn = document.getElementById("close");
const saveBtn = document.getElementById("save");
const switchBtn = document.getElementById("switchCam");

let usingFront = false;
let stream;

/* --- カメラ起動（最大画質）--- */
async function startCamera(){
  if(stream) stream.getTracks().forEach(t=>t.stop());

  stream = await navigator.mediaDevices.getUserMedia({
    video:{
      facingMode: usingFront?"user":"environment",
      width:{ideal:4096},
      height:{ideal:2160}
    }
  });

  video.srcObject = stream;

  if(usingFront){
    video.classList.add("mirror");
  }else{
    video.classList.remove("mirror");
  }
}
startCamera();

/* --- 撮影（完全一致 + 高画質）--- */
document.getElementById("shutter").onclick = ()=>{

  const ctx = canvas.getContext("2d");

  const vw = video.videoWidth;
  const vh = video.videoHeight;

  const rect = video.getBoundingClientRect();
  const displayWidth = rect.width;
  const displayHeight = rect.height;
  const displayRatio = displayWidth / displayHeight;

  const dpr = window.devicePixelRatio || 1;

  const outputWidth = vw;
  const outputHeight = vw / displayRatio;

  canvas.width = outputWidth * dpr;
  canvas.height = outputHeight * dpr;

  ctx.scale(dpr, dpr);

  const videoRatio = vw / vh;

  let sx, sy, sw, sh;

  if(videoRatio > displayRatio){
    sh = vh;
    sw = vh * displayRatio;
    sx = (vw - sw) / 2;
    sy = 0;
  }else{
    sw = vw;
    sh = vw / displayRatio;
    sx = 0;
    sy = (vh - sh) / 2;
  }

  if(usingFront){
    ctx.save();
    ctx.scale(-1,1);
    ctx.drawImage(video, sx,sy,sw,sh, -outputWidth,0,outputWidth,outputHeight);
    ctx.restore();
  }else{
    ctx.drawImage(video, sx,sy,sw,sh, 0,0,outputWidth,outputHeight);
  }

  const overlayHeight = outputHeight * 0.2;

  ctx.drawImage(
    overlay,
    0,0,overlay.naturalWidth,overlay.naturalHeight,
    0,outputHeight - overlayHeight,
    outputWidth,
    overlayHeight
  );

  preview.src = canvas.toDataURL("image/jpeg", 1.0);
  preview.style.display="block";
};

/* close */
closeBtn.onclick = () => {
  preview.style.display="none";
};

/* save */
saveBtn.onclick = () => {
  let a=document.createElement("a");
  a.href=preview.src;
  a.download="photo.jpg";
  a.click();
};

/* switch */
switchBtn.onclick = () => {
  usingFront=!usingFront;
  startCamera();
};
</script>

</body>
</html>
