<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Camera App Overlay Crop Fixed</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#video { position:fixed; top:0; width:100%; height:80%; object-fit:cover; }
#overlay { display:none; }
#shutter {
  position:fixed; bottom:25%; left:50%; transform:translateX(-50%);
  width:100px; height:100px; border:5px solid white; border-radius:50%; z-index:10;
}
#shutter::after {
  content:""; position:absolute; top:50%; left:50%; width:70px; height:70px;
  background:white; border-radius:50%; transform:translate(-50%,-50%);
}
#switchCam {
  position:fixed; bottom:25%; right:20px; width:70px; height:70px;
  border:3px solid white; border-radius:50%; background:black; color:white;
  font-size:30px; text-align:center; line-height:70px; cursor:pointer; z-index:10;
}
#preview { position:fixed; top:0; left:0; width:100%; height:100%; object-fit:contain; display:none; background:black; z-index:20; }
#close, #save {
  position:fixed; top:20px; color:white; font-size:28px; z-index:30;
  padding:5px 15px; border:2px solid white; border-radius:10px; background:rgba(0,0,0,0.4); cursor:pointer;
}
#close { left:20px; }
#save { right:20px; }
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<img id="overlay" src="画像1.jpg">
<div id="shutter"></div>
<div id="switchCam">🔄</div>
<img id="preview">
<div id="close">✖</div>
<div id="save">💾</div>
<canvas id="canvas" style="display:none;"></canvas>

<script>
let lastImage = null;
let usingFront = false;
let currentStream = null;

const video = document.getElementById("video");
const overlay = document.getElementById("overlay");
const preview = document.getElementById("preview");

async function startCamera() {
  if(currentStream) currentStream.getTracks().forEach(t => t.stop());
  try {
    const constraints = { video: { facingMode: usingFront ? "user" : "environment" } };
    currentStream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = currentStream;
  } catch(e) { alert("カメラ起動エラー: "+e); }
}
startCamera();

/* 撮影 */
document.getElementById("shutter").onclick = () => {
  if(!overlay.complete){ alert("画像読み込み中…"); return; }

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const W = window.innerWidth;
  const H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;

  // --- Video 縦横比維持で描画 ---
  const videoAspect = video.videoWidth / video.videoHeight;
  const videoDrawWidth = W;
  const videoDrawHeight = videoDrawWidth / videoAspect;
  const videoY = 0; // 上からスタート
  ctx.drawImage(video, 0, 0, video.videoWidth, video.videoHeight, 0, videoY, videoDrawWidth, videoDrawHeight);

  // --- Overlay 縦横比維持で描画 ---
  const overlayAspect = overlay.naturalWidth / overlay.naturalHeight;
  let overlayDrawWidth = W;
  let overlayDrawHeight = overlayDrawWidth / overlayAspect;

  // 下端に合わせて画面にはみ出す場合は上を切る
  if(overlayDrawHeight > H * 0.2){ 
    overlayDrawHeight = H * 0.2;
    overlayDrawWidth = overlayDrawHeight * overlayAspect;
  }

  const overlayX = (W - overlayDrawWidth) / 2;
  const overlayY = H - overlayDrawHeight;
  ctx.drawImage(overlay, 0, 0, overlay.naturalWidth, overlay.naturalHeight,
                overlayX, overlayY, overlayDrawWidth, overlayDrawHeight);

  lastImage = canvas.toDataURL("image/png");
  preview.src = lastImage;
  preview.style.display = "block";
};

/* プレビュー閉じる */
document.getElementById("close").onclick = () => { preview.style.display = "none"; };

/* 保存 */
document.getElementById("save").onclick = () => {
  if(!lastImage) return alert("先に撮影してください");
  const ua = navigator.userAgent;
  if(/iPhone|iPad|iPod/.test(ua)){
    const win = window.open();
    win.document.write('<img src="'+lastImage+'" style="width:100%">');
  } else {
    const a = document.createElement("a");
    a.href = lastImage;
    a.download = "photo.png";
    a.click();
  }
};

/* カメラ切替 */
document.getElementById("switchCam").onclick = () => {
  usingFront = !usingFront;
  startCamera();
};
</script>
</body>
</html>
